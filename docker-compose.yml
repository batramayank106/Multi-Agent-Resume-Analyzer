version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cvchacha-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - HF_API_KEY=${HF_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-admin@example.com}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-ChangeMe123!}
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./cv_chacha.db:/app/cv_chacha.db
    command: python run.py --backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cvchacha-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    command: python run.py --frontend
